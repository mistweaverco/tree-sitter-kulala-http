name: Push to Luarocks

on:
  release:
    types:
      - created
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  luarocks-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required to count the commits
      - name: Get Version
        run: echo "RELEASE_VERSION=$(git describe --abbrev=0 --tags)" >> $GITHUB_ENV

      - name: Install tree-sitter CLI
        uses: baptiste0928/cargo-install@v3
        with:
          crate: tree-sitter-cli

      - name: Install Lua
        uses: luarocks/gh-actions-lua@v11
        with:
          luaVersion: "5.1"

      - name: Install Luarocks
        uses: luarocks/gh-actions-luarocks@master
      - name: Install `luarocks-build-treesitter-parser` Package
        run: |
          luarocks --verbose --local --lua-version=5.1 install luarocks-build-treesitter-parser
      - name: LuaRocks Upload
        uses: nvim-neorocks/luarocks-tag-release@v7
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        with:
          name: tree-sitter-kulala_http
          version: ${{ env.RELEASE_VERSION }}
          labels: |
            neovim
            tree-sitter
            kulala
          summary: Tree-sitter grammar for http (kulala-flavour). 
          template: .github/workflows/tree-sitter-kulala_http.rockspec.template
